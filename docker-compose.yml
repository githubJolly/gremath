version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gremath-app
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/opt/app/data/gremathdb
      SPRING_DATASOURCE_DRIVERCLASSNAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_H2_CONSOLE_ENABLED: "false"
      SPRING_THYMELEAF_CACHE: "true"
      SERVER_PORT: 8080
    volumes:
      - app_data:/opt/app/data
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    container_name: gremath-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - web

  certbot:
    image: certbot/certbot:latest
    container_name: gremath-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  app_data:
  certbot_www:
  certbot_certs:

networks:
  web:
    driver: bridge
