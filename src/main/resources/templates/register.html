<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign up')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container container-narrow">
    <div class="card">
        <h1>Create your account</h1>
        <p class="muted">Each student gets their own private login and progress.</p>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${registrationForm}" method="post">
            <div class="form-group">
                <label for="fullName">Full name</label>
                <input type="text" id="fullName" th:field="*{fullName}"/>
                <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}"/>
                <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}"/>
                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}"/>
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn btn-block">Sign up</button>
        </form>
        <p class="muted" style="margin-top:16px;">
            Already registered? <a th:href="@{/login}">Log in</a>
        </p>
    </div>
</div>
</body>
</html>
