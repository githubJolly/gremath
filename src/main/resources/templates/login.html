<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container container-narrow">
    <div class="card">
        <h1>Welcome back</h1>
        <p class="muted">Log in to continue learning.</p>

        <div class="alert alert-error" th:if="${param.error}">
            Invalid username or password.
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            You have been logged out.
        </div>
        <div class="alert alert-success" th:if="${param.registered}">
            Account created! Please log in.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required/>
            </div>
            <button type="submit" class="btn btn-block">Log in</button>
        </form>
        <p class="muted" style="margin-top:16px;">
            No account? <a th:href="@{/register}">Create one</a>
        </p>
    </div>
</div>
</body>
</html>
